<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon | NASH | Gnomie</title>
  <link href="https://fonts.googleapis.com/css2?family=Bokor&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .coming-soon-page { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 160px);text-align:center;padding:40px var(--pad-mobile); }
    .coming-soon-title { font-family:var(--font-display);font-size:32px;color:var(--accent);margin-bottom:16px;line-height:1.2;text-shadow:0 0 40px rgba(255,95,162,0.25); }
    .coming-soon-message { font-size:15px;line-height:1.7;color:var(--text-body);margin-bottom:28px;max-width:400px; }
    @media(max-width:400px) { .coming-soon-title{font-size:26px;} }
  </style>
</head>
<body>
  <div id="nav-inject"></div>
  <div class="coming-soon-page">
    <h1 class="coming-soon-title">Something magical is brewing...</h1>
    <p class="coming-soon-message">You've stumbled upon an area that hasn't been completed yet! Check back soon.</p>
    <div class="btn-group">
      <a href="index.html" class="btn btn-primary">Back to home</a>
      <a href="#" class="btn btn-outline" onclick="history.back(); return false;">Go back</a>
    </div>
  </div>
  <div id="footer-inject"></div>
  <div id="contact-popup-inject"></div>
  <script src="components.js"></script>
</body>
</html>
